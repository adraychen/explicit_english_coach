<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Conversation Coach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f6fa; color: #212529; min-height: 100vh; }
    nav  { background: #fff; border-bottom: 1px solid #e9ecef; padding: 14px 24px;
           display: flex; align-items: center; justify-content: space-between;
           flex-wrap: wrap; gap: 10px; }
    nav .brand { font-weight: 600; font-size: 16px; }
    .style-toggle { display: flex; gap: 6px; align-items: center; }
    .style-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #dee2e6;
                 font-size: 13px; cursor: pointer; background: transparent;
                 color: #6c757d; font-family: inherit; transition: all .15s; }
    .style-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .style-btn:hover:not(.active) { background: #f1f3f5; }
    .coach-label { font-size: 12px; color: #6c757d; }
    .container  { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    .chat-box   { background: #fff; border-radius: 12px; border: 1px solid #e9ecef;
                  padding: 20px; min-height: 400px; margin-bottom: 16px;
                  display: flex; flex-direction: column; gap: 8px; }
    .bubble     { padding: 12px 16px; border-radius: 12px; font-size: 14px;
                  line-height: 1.6; max-width: 80%; }
    .bubble-coach   { background: #f1f3f5; color: #212529; align-self: flex-start; }
    .bubble-student { background: #0d6efd; color: #fff; align-self: flex-end; }
    .coach-name-tag { font-size: 11px; color: #6c757d; margin-bottom: 2px;
                      align-self: flex-start; padding-left: 4px; }
    .input-row  { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
    .mic-btn    { width: 52px; height: 52px; border-radius: 50%; border: none;
                  background: #0d6efd; color: #fff; font-size: 20px; cursor: pointer;
                  flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .mic-btn.recording { background: #dc3545; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .text-input { flex: 1; padding: 12px 16px; border: 1px solid #ced4da;
                  border-radius: 8px; font-size: 14px; outline: none; }
    .text-input:focus { border-color: #0d6efd; }
    .send-btn   { padding: 12px 20px; background: #0d6efd; color: #fff; border: none;
                  border-radius: 8px; font-size: 14px; cursor: pointer; }
    .end-btn    { width: 100%; padding: 12px; background: #198754; color: #fff;
                  border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
                  cursor: pointer; margin-top: 12px; }
    .hint       { font-size: 12px; color: #6c757d; text-align: center; margin-top: 8px; }
    .modal-bg   { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
                  z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal      { background: #fff; border-radius: 12px; padding: 28px; max-width: 640px;
                  width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2   { font-size: 18px; margin-bottom: 16px; }
    .modal-body { font-size: 14px; line-height: 1.8; color: #212529; }
    .modal-body strong { color: #0d6efd; }
    .modal-body h2 { font-size: 16px; margin: 16px 0 8px; color: #0d6efd; }
    .modal-body h3 { font-size: 14px; margin: 12px 0 6px; color: #212529; }
    .modal-footer { margin-top: 20px; display: flex; gap: 10px; }
    .btn-new    { padding: 10px 20px; background: #0d6efd; color: #fff; border: none;
                  border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-close  { padding: 10px 20px; background: #e9ecef; color: #495057; border: none;
                  border-radius: 8px; font-size: 14px; cursor: pointer; }
    .spinner    { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc;
                  border-top-color: #0d6efd; border-radius: 50%;
                  animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <span class="brand">🗣️ English Conversation Coach</span>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="coach-label">Coach: <strong id="coach-name-display">{{ coach_name }}</strong></span>
    <div class="style-toggle">
      <button class="style-btn {% if style == 'casual' %}active{% endif %}"
              id="btn-casual" onclick="switchStyle('casual')">
        💬 Casual (Dora)
      </button>
      <button class="style-btn {% if style == 'clear' %}active{% endif %}"
              id="btn-clear" onclick="switchStyle('clear')">
        📖 Clear (Morgan)
      </button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="chat-box" id="chat-box">
    <div class="coach-name-tag" id="opening-tag">{{ coach_name }}</div>
    <div class="bubble bubble-coach" id="opening-bubble">
      {{ opening }}
    </div>
  </div>

  <div class="input-row">
    <button class="mic-btn" id="mic-btn">🎤</button>
    <input class="text-input" type="text" id="text-input"
           placeholder="Type your reply here...">
    <button class="send-btn" id="send-btn">Send</button>
  </div>
  <div class="hint">Tap 🎤 to start recording · tap again to stop</div>

  <button class="end-btn" id="end-btn">End conversation &amp; see summary</button>
</div>

<!-- Summary modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>📝 Conversation Summary</h2>
    <div class="modal-body" id="modal-body">
      <span class="spinner"></span> Generating your summary...
    </div>
    <div class="modal-footer">
      <button class="btn-new" onclick="newConversation()">New conversation</button>
      <button class="btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<audio id="audio-player" style="display:none"></audio>

<script>
  const chatBox   = document.getElementById('chat-box');
  const micBtn    = document.getElementById('mic-btn');
  const textInput = document.getElementById('text-input');
  const sendBtn   = document.getElementById('send-btn');
  const endBtn    = document.getElementById('end-btn');
  const player    = document.getElementById('audio-player');

  let isRecording   = false;
  let mediaRecorder = null;
  let audioChunks   = [];
  let busy          = false;
  let currentStyle  = "{{ style }}";
  let coachName     = "{{ coach_name }}";

  function playAudio(b64, onEnded) {
    if (!b64) { if (onEnded) onEnded(); return; }
    player.src = 'data:audio/mp3;base64,' + b64;
    player.onended = onEnded || null;
    player.play().catch(() => { if (onEnded) onEnded(); });
  }

  function addBubble(text, type, name) {
    if (type === 'coach' && name) {
      const tag = document.createElement('div');
      tag.className = 'coach-name-tag';
      tag.textContent = name;
      chatBox.appendChild(tag);
    }
    const div = document.createElement('div');
    div.className = 'bubble bubble-' + type;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function setInputEnabled(enabled) {
    micBtn.disabled    = !enabled;
    sendBtn.disabled   = !enabled;
    endBtn.disabled    = !enabled;
    textInput.disabled = !enabled;
  }

  async function sendAnswer(text) {
    if (!text.trim() || busy) return;
    busy = true;
    setInputEnabled(false);
    textInput.value = '';

    addBubble(text, 'student');

    const typing = document.createElement('div');
    typing.className = 'bubble bubble-coach';
    typing.innerHTML = '<span class="spinner"></span>';
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    const res  = await fetch('/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    typing.remove();

    addBubble(data.reply, 'coach', coachName);
    playAudio(data.reply_audio, () => {
      if (data.session_complete) {
        // Morgan has taught enough words — go to review
        addBubble("That's a great place to pause! Let's look at what we covered today.", 'coach', coachName);
        setTimeout(showSummary, 800);
      } else {
        busy = false;
        setInputEnabled(true);
        textInput.focus();
      }
    });
  }

  async function showSummary() {
    document.getElementById('modal-bg').classList.add('open');
    const body = document.getElementById('modal-body');
    body.innerHTML = '<span class="spinner"></span> Generating your review...';
    try {
      const res = await fetch('/summary', { method: 'POST' });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      body.innerHTML = (data.summary || 'No summary available.')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    } catch (err) {
      body.innerHTML = 'Sorry, the review could not be generated this time. '
        + 'Please try again, or start a new conversation.';
    }
  }

  async function switchStyle(style) {
    if (style === currentStyle) return;
    const res  = await fetch('/set_style', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ style }),
    });
    const data = await res.json();
    currentStyle = style;
    coachName    = data.coach_name;

    // Update toggle buttons
    document.getElementById('btn-casual').classList.toggle('active', style === 'casual');
    document.getElementById('btn-clear').classList.toggle('active',  style === 'clear');

    // Update coach name display
    document.getElementById('coach-name-display').textContent = coachName;

    // Clear chat and reset
    chatBox.innerHTML = '';
    const tag = document.createElement('div');
    tag.className = 'coach-name-tag';
    tag.textContent = coachName;
    chatBox.appendChild(tag);
    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-coach';
    bubble.textContent = data.opening || 'Say anything to start chatting!';
    chatBox.appendChild(bubble);

    busy = false;
    setInputEnabled(true);

    // Morgan greets out loud to kick off the lesson
    if (data.opening_audio) {
      playAudio(data.opening_audio);
    }
  }

  endBtn.addEventListener('click', showSummary);

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
  }

  async function newConversation() {
    await fetch('/new');
    window.location.href = '/';
  }

  micBtn.addEventListener('click', async () => {
    if (!isRecording) {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks   = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/wav' });
        const res  = await fetch('/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'audio/wav' },
          body: blob,
        });
        const data = await res.json();
        if (data.text) sendAnswer(data.text);
      };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹';
    } else {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
    }
  });

  sendBtn.addEventListener('click', () => sendAnswer(textInput.value));
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendAnswer(textInput.value);
  });

  // Play Morgan's opening greeting on load (clear style only)
  window.addEventListener('load', () => {
    if (currentStyle === 'clear') {
      const openingText = document.getElementById('opening-bubble').textContent.trim();
      // Request audio for the opening via a lightweight call
      fetch('/set_style', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ style: 'clear' }),
      }).then(r => r.json()).then(d => {
        if (d.opening_audio) playAudio(d.opening_audio);
      }).catch(() => {});
    }
  });
</script>
</body>
</html>
